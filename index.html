<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        .header {
            background: #161b22;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #30363d;
        }

        .header h1 {
            color: #58a6ff;
            font-size: 2rem;
        }

        .header p {
            color: #8b949e;
            margin-top: 5px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            gap: 10px;
        }

        input {
            width: 400px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #58a6ff;
        }

        button {
            padding: 12px 24px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #2ea043;
        }

        .profile-card {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-header img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #58a6ff;
        }

        .profile-info h2 {
            color: #e6edf3;
            font-size: 1.5rem;
        }

        .profile-info p {
            color: #8b949e;
            margin-top: 5px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat {
            background: #0d1117;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #58a6ff;
        }

        .github-link {
            display: inline-block;
            margin-top: 10px;
            color: #58a6ff;
            text-decoration: none;
        }

        .analysis-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
        }

        .analysis-card h3 {
            color: #58a6ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .analysis-text {
            line-height: 1.8;
            color: #c9d1d9;
        }

        .analysis-text h2 {
            color: #58a6ff;
            margin: 15px 0 10px 0;
        }

        .analysis-text h3 {
            color: #58a6ff;
            margin: 15px 0 8px 0;
        }

        .analysis-text li {
            margin: 5px 0 5px 20px;
        }

        .analysis-text hr {
            border-color: #30363d;
            margin: 15px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #58a6ff;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 GitHub Profile Analyzer</h1>
        <p>Enter a GitHub username to get an AI-powered career analysis</p>
    </div>

    <div class="search-container">
        <input type="text" id="username" placeholder="Enter GitHub username e.g. thelmaBangsi">
        <button onclick="analyzeProfile()">Analyze</button>
    </div>

    <div id="results"></div>

    <script>
        async function analyzeProfile() {
            const username = document.getElementById('username').value;
            if (!username) {
                alert('Please enter a username');
                return;
            }

            document.getElementById('results').innerHTML = '<div class="loading">🔍 Analyzing profile...</div>';

            const response = await fetch(`/api/analyze/${username}`);
            const data = await response.json();

            document.getElementById('results').innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <img src="${data.avatar}" alt="${data.user}">
                        <div class="profile-info">
                            <h2>${data.user}</h2>
                            <p>${data.bio || 'No bio provided'}</p>
                            <div class="stats">
                                <span class="stat">📍 ${data.location || 'Not provided'}</span>
                                <span class="stat">📁 ${data.repos} repos</span>
                            </div>
                            <a class="github-link" href="${data.github_url}" target="_blank">View on GitHub →</a>
                        </div>
                    </div>
                    <div class="analysis-card">
                        <h3>🤖 AI Career Analysis</h3>
                        <div class="analysis-text" id="analysis-content"></div>
                    </div>
                </div>
            `;

            document.getElementById('analysis-content').innerHTML =
                data.analysis
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/- (.*)/g, '<li>$1</li>')
                .replace(/---/g, '<hr>');
        }
    </script>
</body>
</html>
